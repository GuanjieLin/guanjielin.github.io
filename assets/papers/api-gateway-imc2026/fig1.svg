<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Overview of LLM API gateway architecture and the main transparency and consistency challenges</title>
  <desc id="desc">A user request enters an LLM API gateway, which forwards requests to multiple upstream models such as GPT, Claude Opus, Claude Sonnet, and Gemini Pro. The gateway may introduce model downgrading or switching, truncation, billing inaccuracy, and latency fluctuation.</desc>

  <defs>
    <linearGradient id="gatewayFill" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="vendorFill" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="warnFill" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="900" rx="24" fill="#ffffff"/>

  <text x="700" y="72" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    LLM API Gateway Architecture and Key Risks
  </text>

  <rect x="80" y="335" width="220" height="120" rx="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <text x="190" y="388" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#0f172a">User Request</text>
  <text x="190" y="425" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#475569">OpenAI-compatible API call</text>

  <rect x="470" y="240" width="440" height="310" rx="28" fill="url(#gatewayFill)" stroke="#2563eb" stroke-width="3" filter="url(#shadow)"/>
  <text x="690" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#1d4ed8">LLM API Gateway</text>
  <text x="690" y="368" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#1e3a8a">Unified API, routing, caching, and billing layer</text>

  <rect x="540" y="405" width="300" height="95" rx="16" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
  <text x="690" y="444" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Black-box intermediary</text>
  <text x="690" y="474" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#475569">Users cannot directly verify internal</text>
  <text x="690" y="498" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#475569">routing, truncation, or pricing logic</text>

  <path d="M300 395 L470 395" fill="none" stroke="#2563eb" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <text x="385" y="378" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#1d4ed8">request enters gateway</text>

  <rect x="1070" y="120" width="220" height="92" rx="18" fill="url(#vendorFill)" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <text x="1180" y="165" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#111827">GPT</text>
  <text x="1180" y="194" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">Official vendor endpoint</text>

  <rect x="1070" y="248" width="220" height="92" rx="18" fill="url(#vendorFill)" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <text x="1180" y="289" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#111827">Claude Opus</text>
  <text x="1180" y="318" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">Official vendor endpoint</text>

  <rect x="1070" y="376" width="220" height="92" rx="18" fill="url(#vendorFill)" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <text x="1180" y="417" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#111827">Claude Sonnet</text>
  <text x="1180" y="446" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">Official vendor endpoint</text>

  <rect x="1070" y="504" width="220" height="92" rx="18" fill="url(#vendorFill)" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <text x="1180" y="545" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#111827">Gemini Pro</text>
  <text x="1180" y="574" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">Official vendor endpoint</text>

  <path d="M910 282 C 980 245, 1005 202, 1070 166" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M910 342 C 980 324, 1005 304, 1070 294" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M910 412 C 980 412, 1005 412, 1070 422" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M910 482 C 980 520, 1005 548, 1070 550" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <text x="995" y="235" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#1d4ed8">routes to claimed or substituted model</text>

  <rect x="120" y="150" width="255" height="88" rx="18" fill="url(#warnFill)" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="247" y="186" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#9a3412">Model Downgrading</text>
  <text x="247" y="214" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#9a3412">or Switching</text>
  <path d="M375 194 C 430 215, 470 240, 525 272" fill="none" stroke="#ea580c" stroke-width="3.5" marker-end="url(#arrowOrange)"/>

  <rect x="120" y="560" width="210" height="88" rx="18" fill="url(#warnFill)" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="225" y="608" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#9a3412">Truncation</text>
  <path d="M330 602 C 410 592, 455 560, 525 518" fill="none" stroke="#ea580c" stroke-width="3.5" marker-end="url(#arrowOrange)"/>

  <rect x="530" y="660" width="320" height="88" rx="18" fill="url(#warnFill)" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="690" y="697" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#9a3412">Billing Inaccuracy</text>
  <text x="690" y="724" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#9a3412">usage and price may deviate from expectation</text>
  <path d="M690 550 L690 660" fill="none" stroke="#ea580c" stroke-width="3.5" marker-end="url(#arrowOrange)"/>

  <rect x="1010" y="680" width="250" height="88" rx="18" fill="url(#warnFill)" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="1135" y="718" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#9a3412">Latency Fluctuation</text>
  <path d="M960 520 C 1015 585, 1050 636, 1100 680" fill="none" stroke="#ea580c" stroke-width="3.5" marker-end="url(#arrowOrange)"/>

  <text x="700" y="840" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#475569">
    Web-native redraw for the personal site, based on the original Figure 1 semantics in the local paper source.
  </text>
</svg>
